name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Derive release version
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"

          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::Release tags must be semver tags like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

          dist_tag="latest"
          if [[ "$version" == *-* ]]; then
            dist_tag="next"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Set package version from tag
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          fi

          npm publish --provenance --tag "${{ steps.release.outputs.dist_tag }}"

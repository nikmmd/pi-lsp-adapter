name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Derive release version
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"

          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::Release tags must be semver tags like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

          dist_tag="latest"
          if [[ "$version" == *-* ]]; then
            dist_tag="next"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$dist_tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify package version matches tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")

          if [[ "$package_version" != "$RELEASE_VERSION" ]]; then
            echo "::error::package.json version ($package_version) does not match release tag ($RELEASE_VERSION)"
            exit 1
          fi

      - name: Check package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public --tag "${{ steps.release.outputs.dist_tag }}"
